---
_moodle_httpd_data_directory:
  Alpine: /var/www/{{ httpd_servername | default(ansible_fqdn) }}
  Suse: /srv/www/htdocs
  default: /var/www/html
_moodle_httpd_group:
  Debian: www-data
  Suse: www
  default: apache
_moodle_httpd_owner:
  Debian: www-data
  Suse: wwwrun
  default: apache
_moodle_requirements:
  Debian:
    - php-mysqli
    - php-zip
    - php-gd
    - php-intl
    - php-xmlrpc
    - php-soap
    - php-mbstring
  Debian-testing:
    - php-mysql
    - php-zip
    - php-gd
    - php-intl
    - php-soap
    - php-mbstring
  RedHat-8:
    - php-mysqlnd
    - php-zip
    - php-gd
    - php-intl
    - php-xmlrpc
    - php-soap
    - php-json
    - php-mbstring
    - php-ldap
  Suse:
    - php7-mysql
    - php7-zip
    - php7-gd
    - php7-intl
    - php7-xmlrpc
    - php7-soap
  default:
    - php-pear-MDB2-Driver-mysqli
    - php-zip
    - php-gd
    - php-intl
    - php-xmlrpc
    - php-soap
    - php-mbstring
moodle_httpd_data_directory: "{{ _moodle_httpd_data_directory[ansible_os_family] | default(_moodle_httpd_data_directory['default']) }}"
moodle_httpd_group: "{{ _moodle_httpd_group[ansible_os_family] | default(_moodle_httpd_group['default']) }}"
moodle_httpd_owner: "{{ _moodle_httpd_owner[ansible_os_family] | default(_moodle_httpd_owner['default']) }}"
moodle_requirements:
  "{{ _moodle_requirements[ansible_os_family ~ '-' ~ ansible_distribution_major_version] | default(_moodle_requirements[ansible_os_family] | default(_moodle_requirements['default']
  )) }}"
moodle_src: "https://download.moodle.org/download.php/direct/stable{{ moodle_version }}/moodle-latest-{{ moodle_version }}.zip"
