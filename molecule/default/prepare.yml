---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Install python3 and sudo
      ansible.builtin.raw: |
        if command -v dnf 2>/dev/null; then
          dnf install -y python3 sudo
        elif command -v apt-get 2>/dev/null; then
          apt-get update -qq && apt-get install -y python3 sudo
        elif command -v apk 2>/dev/null; then
          apk update && apk add python3 sudo
        fi
      become: false
      changed_when: true

    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.buildtools
    - role: buluma.epel
    - role: buluma.mysql
      mysql_databases:
        - collation: utf8mb4_unicode_ci
          encoding: utf8mb4
          name: moodle
      mysql_users:
        - name: moodle
          password: moodle
          priv: moodle.*:ALL
    - role: buluma.python_pip
    - role: buluma.openssl
      openssl_items:
        - common_name: "{{ ansible_facts['fqdn'] }}"
          name: apache-httpd
    - role: buluma.php
    - role: buluma.selinux
    - role: buluma.httpd
      httpd_vhosts:
        - name: moodle
          servername: moodle.example.com
    - role: buluma.cron
    - role: buluma.core_dependencies
