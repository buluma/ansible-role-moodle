---
- name: Prepare
  become: true
  gather_facts: false
- name: Prepare
  hosts: all
  pre_tasks:
    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.buildtools
    - role: buluma.epel
    - mysql_databases:
        - collation: utf8mb4_unicode_ci
          encoding: utf8mb4
          name: moodle
      mysql_users:
        - name: moodle
          password: moodle
          priv: moodle.*:ALL
      role: buluma.mysql
    - role: buluma.python_pip
    - openssl_items:
        - common_name: "{{ ansible_facts['fqdn'] }}"
          name: apache-httpd
      role: buluma.openssl
    - role: buluma.php
    - role: buluma.selinux
    - httpd_vhosts:
        - name: moodle
          servername: moodle.example.com
      role: buluma.httpd
    - role: buluma.cron
    - role: buluma.core_dependencies
