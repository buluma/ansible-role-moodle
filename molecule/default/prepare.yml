---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false
  roles:
    - role: buluma.bootstrap
    - role: buluma.buildtools
    - role: buluma.epel
    - role: buluma.mysql
      mysql_databases:
        - collation: utf8mb4_unicode_ci
          encoding: utf8mb4
          name: moodle
      mysql_users:
        - name: moodle
          password: moodle
          priv: moodle.*:ALL
    - role: buluma.python_pip
    - role: buluma.openssl
      openssl_items:
        - common_name: "{{ ansible_facts['fqdn'] }}"
          name: apache-httpd
    - role: buluma.php
    - role: buluma.selinux
    - role: buluma.httpd
      httpd_vhosts:
        - name: moodle
          servername: moodle.example.com
    - role: buluma.cron
    - role: buluma.core_dependencies
